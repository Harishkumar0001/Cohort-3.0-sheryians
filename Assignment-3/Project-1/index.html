<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squid game</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <main class="main-image">
        <nav class="navbar container">
            <div class="logo">
                <img src="./name.png" alt="">
            </div>
            <div class="nav-links">
                <a href="#">About</a>
                 <a href="#" class="watch">Watch Now</a>
                  <a href="#">Actors</a>
                   <a href="#">Contact</a>
            </div>
            <div class="icon">
                <i class="ri-menu-3-line"></i>
            </div>
        </nav>

             <section class="hero-body ">
            <div class="hero-content">
                <div class="title-image">
                    <img src="./name.png" alt="Squid Game">
                </div>
                <p class="description">
                    Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br>
                    Season 1: 9 Episodes
                </p>
                <div class="btn-group">
                    <button>
                        <div class="icon-circle">
                            <i class="ri-play-fill"></i> <span >Play now</span>
                        </div>
                    </button>
                      <button>
                        <div class="icon-trailer">
                            <i class="ri-play-line"></i>Watch trailer 
                        </div>
                    </button>
                </div>

                <div class="person-image">
                    <img src="./person.png" alt="">
                </div>

                <div class="scroll-indicator">
                    <div class="scroll-text">SCROLL</div>
                    <div class="scroll-line"></div>
                </div>

                <div class="social-icons">
                    <a href="#"><i class="ri-twitter-line"></i></a>
                    <a href="#"><i class="ri-instagram-line"></i></a>
                    <a href="#"><i class="ri-facebook-fill"></i></a>
                </div>
        </section>

        <section class="bottom-cards">
            <div class=" cards">
                <div class="card">
                    <img src="./1.webp" alt="1">
                 <div class="play-overlay"><i class="ri-play-fill"></i></div>
                </div>
                  <div class="card">
                    <img src="./2.webp" alt="2">
                    <div class="play-overlay"><i class="ri-play-fill"></i></div>
                 </div>
                   <div class="card">
                    <img src="./3.png" alt="2">
                    <div class="play-overlay"><i class="ri-play-fill"></i></div>
                 </div>
            </div>
        </section>
    </main>
</body>
</html>
